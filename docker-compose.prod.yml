version: '3.8'

services:
  backend:
    image: <ECR_ACCOUNT>.dkr.ecr.eu-central-1.amazonaws.com/secureincident-backend:${IMAGE_TAG}
    restart: unless-stopped
    env_file: .env.prod
    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: <ECR_ACCOUNT>.dkr.ecr.eu-central-1.amazonaws.com/secureincident-frontend:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

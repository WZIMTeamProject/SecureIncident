name: Backend QA (Tests & Build Checks)
on:
  push:
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]

jobs:
  security-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Sync dependencies
        run: uv sync

      - name: Run bandit
        working-directory: backend
        run: uv run bandit -r api core db services main.py > ../docs/bandit.txt 2>&1 || true

      - name: Run pip-audit
        working-directory: backend
        run: uv run pip-audit -r requirements.txt > ../docs/pip-audit.txt 2>&1 || true

      - name: Run vulture
        working-directory: backend
        run: uv run vulture . --min-confidence 80 --exclude "*/tests/*" > ../docs/vulture.txt 2>&1 || true

      - name: Commit results to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bandit.txt docs/pip-audit.txt docs/vulture.txt
          git diff --staged --quiet || git commit -m "update security scan results"
          git push

  run-tests:
    needs: security-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        working-directory: backend
        run: uv run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

  test-docker-build:
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (Dry-run)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
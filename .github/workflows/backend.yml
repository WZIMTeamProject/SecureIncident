name: Backend CI/CD
on:
  push:
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Sync dependencies
        run: uv sync

      - name: Run bandit
        working-directory: backend
        run: |
          uv run bandit -r api core db services main.py > ../docs/bandit.txt 2>&1
          BANDIT_EXIT=$?
          cat ../docs/bandit.txt >> "$GITHUB_STEP_SUMMARY"
          if [ "$BANDIT_EXIT" -eq 0 ] || [ "$BANDIT_EXIT" -eq 1 ]; then
            exit 0
          else
            exit "$BANDIT_EXIT"
          fi

      - name: Run pip-audit
        working-directory: backend
        run: |
          test -f requirements.txt || { echo "missing requirements.txt"; exit 1; }
          uv run pip-audit -r requirements.txt --no-deps --disable-pip > ../docs/pip-audit.txt 2>&1
          PIP_AUDIT_EXIT=$?
          cat ../docs/pip-audit.txt >> "$GITHUB_STEP_SUMMARY"
          # pip-audit has no exit code distinct from "vulnerabilities found" vs "tool error" (unlike
          # bandit/vulture), so any non-zero is treated as a finding rather than a job failure.
          echo "pip-audit exited $PIP_AUDIT_EXIT (treated as finding, not failed)"
          exit 0

      - name: Run vulture
        working-directory: backend
        run: |
          # --ignore-names cls: Pydantic's @field_validator + @classmethod requires a `cls` first
          # param that validator bodies never reference; vulture can't see the decorator-imposed
          # signature and flags it as dead code, so it's suppressed here rather than in the code.
          uv run vulture . --min-confidence 80 --exclude '*/tests/*' --ignore-names 'cls' > ../docs/vulture.txt 2>&1
          VULTURE_EXIT=$?
          cat ../docs/vulture.txt >> "$GITHUB_STEP_SUMMARY"
          if [ "$VULTURE_EXIT" -eq 0 ] || [ "$VULTURE_EXIT" -eq 3 ]; then
            exit 0
          else
            exit "$VULTURE_EXIT"
          fi

      - name: Commit results to docs/
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bandit.txt docs/pip-audit.txt docs/vulture.txt
          git diff --staged --quiet || {
            git commit -m "update security scan results"
            BRANCH_NAME="${{ github.ref_name }}"
            git checkout -B "$BRANCH_NAME"
            git push origin "$BRANCH_NAME"
          }

  test:
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        working-directory: backend
        run: uv run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (Dry-run)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Sync dependencies
        run: uv sync

      - name: Export production requirements
        run: uv export --frozen --no-dev -o backend/requirements.txt

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/wzimteamproject/secureincident-backend:latest
            ghcr.io/wzimteamproject/secureincident-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/secureincident
            ~/secureincident/fetch-secrets.sh
            docker compose pull backend
            docker compose up -d --force-recreate backend
            timeout 60 bash -c 'until docker compose exec backend curl -sf http://localhost:8000/health; do sleep 3; done'

  pr-conflict-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check merge conflicts and staleness against main
        run: |
          set -euo pipefail
          git fetch origin main
          MERGE_BASE=$(git merge-base HEAD origin/main)
          if git merge-tree "$MERGE_BASE" HEAD origin/main | grep -q '^<<<<<<<'; then
            echo "Merge conflicts detected with main" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No merge conflicts with main" >> "$GITHUB_STEP_SUMMARY"
          fi
          BEHIND_COUNT=$(git rev-list --count HEAD..origin/main)
          echo "Branch is $BEHIND_COUNT commit(s) behind main" >> "$GITHUB_STEP_SUMMARY"

name: CI Checks

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: false
          build-args: VITE_API_BASE_URL=http://localhost:8000

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false

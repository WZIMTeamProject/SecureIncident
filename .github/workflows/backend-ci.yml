name: Backend Production Deploy
on:
  push:
    branches: [main]
    paths: [backend/**]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/wzimteamproject/secureincident-backend:latest
            ghcr.io/wzimteamproject/secureincident-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/secureincident
            ~/secureincident/fetch-secrets.sh
            docker compose pull backend
            docker compose up -d backend
            sleep 25
            docker exec secureincident-backend-1 curl -f http://localhost:8000/health
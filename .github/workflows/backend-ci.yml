name: Backend Deploy CI/CD
on:
  push:
    branches: [main]
    paths: [backend/**]

jobs:
  security-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install bandit pip-audit vulture

      - name: Run bandit
        working-directory: backend
        run: bandit -r api core db services main.py > ../docs/bandit.txt 2>&1 || true

      - name: Run pip-audit
        working-directory: backend
        run: pip-audit -r requirements.txt > ../docs/pip-audit.txt 2>&1 || true

      - name: Run vulture
        working-directory: backend
        run: vulture . --min-confidence 80 > ../docs/vulture.txt 2>&1 || true

      - name: Commit results to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bandit.txt docs/pip-audit.txt docs/vulture.txt
          git diff --staged --quiet || git commit -m "update security scan results"
          git push

  build-and-deploy:
    needs: security-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/wzimteamproject/secureincident-backend:latest
            ghcr.io/wzimteamproject/secureincident-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/secureincident
            ~/secureincident/fetch-secrets.sh
            docker compose pull backend
            docker compose up -d backend
            sleep 25
            docker exec secureincident-backend-1 curl -f http://localhost:8000/health
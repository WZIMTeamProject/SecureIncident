name: Backend Production Deploy
on:
  push:
    branches: [ main ]
    paths: [ backend/** ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        working-directory: backend
        run: uv run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

      - name: Export production requirements
        run: uv export --frozen --no-dev -o backend/requirements.txt

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/wzimteamproject/secureincident-backend:latest
            ghcr.io/wzimteamproject/secureincident-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/secureincident
            ~/secureincident/fetch-secrets.sh
            docker compose pull backend
            docker compose up -d --force-recreate backend
            timeout 60 bash -c 'until docker compose exec backend curl -sf http://localhost:8000/health; do sleep 3; done'

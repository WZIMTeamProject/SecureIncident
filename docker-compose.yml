version: '3.8'

services:
  db:
    image: postgres:16
    container_name: secure_incident_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: secure_incident
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d secure_incident"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: secure_incident_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
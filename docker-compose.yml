services:
  frontend:
    image: ghcr.io/wzimteamproject/secureincident-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare/cert.pem:/etc/ssl/cloudflare/cert.pem:ro
      - /etc/ssl/cloudflare/key.pem:/etc/ssl/cloudflare/key.pem:ro
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: ghcr.io/wzimteamproject/secureincident-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_MINUTES: 1440
      REFRESH_TOKEN_REMEMBER_EXPIRE_MINUTES: 43200
      # Single-origin prod (SPA + /api proxied on the same HTTPS host): Secure
      # cookie over TLS, SameSite=lax sends fine same-site. Revisit to "none" only
      # if the SPA moves to a separate origin (CloudFront/S3 + ALB topology).
      REFRESH_COOKIE_SECURE: "True"
      REFRESH_COOKIE_SAMESITE: lax
      INVITE_EXPIRE_MINUTES: 60
      INVITE_MAX_EXPIRE_MINUTES: 1440
      ALLOWED_ORIGINS: '["https://secure-incident.pl"]'
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TLS: "True"
      FRONTEND_URL: ${FRONTEND_URL}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

services:
  frontend:
    image: ghcr.io/wzimteamproject/secureincident-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare/cert.pem:/etc/ssl/cloudflare/cert.pem:ro
      - /etc/ssl/cloudflare/key.pem:/etc/ssl/cloudflare/key.pem:ro
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: ghcr.io/wzimteamproject/secureincident-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ALLOWED_ORIGINS: '["https://secure-incident.pl"]'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
  mailpit:
    image: axllent/mailpit:latest
    container_name: secure_incident_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
    - id: bandit
      args: ["-c", "pyproject.toml"]
      files: ^backend/

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.1
    hooks:
      -   id: pip-audit
          args: ["-r", "backend/requirements.txt", "--no-deps", "--disable-pip"]
          files: ^backend/

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.11
    hooks:
      - id: vulture
        files: ^backend/
        # --ignore-names cls: Pydantic's @field_validator + @classmethod requires a `cls` first
        # param that validator bodies never reference; vulture can't see the decorator-imposed
        # signature and flags it as dead code, so it's suppressed here rather than in the code.
        args: [backend/, --min-confidence, "80", --exclude, "*/tests/*", --ignore-names, "cls"]

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        language: node
        entry: bash -c 'cd Frontend && npx eslint --fix src/'
        files: ^Frontend/.*\.[jt]sx?$
        pass_filenames: false
